#################################################################################
#                               OneBranch Pipelines                             #
# Official OneBranch pipeline for Microsoft.UI.Reactor (CrossPlat, docked).      #
# Produces framework NuGet packages (Microsoft.UI.Reactor,                      #
# Microsoft.UI.Reactor.Advanced, Microsoft.UI.Reactor.Devtools + Templates)     #
# and the reactor skill kit (mur x64 + arm64).                                  #
# Official builds run network-restricted: NuGet restore resolves from            #
# build/pipelines/nuget.internal.config (a pre-seeded internal package feed).     #
# Release model (docs/specs/057-release-channels.md): a `v*` tag push            #
# auto-builds + signs (stage `build`), then the publish to nuget.org runs in a   #
# separate approval-gated release stage (`Production_PublishNuGet`, the          #
# OneBranch "Deploy Box Products" / NonAzure pathway). Build is automatic; the   #
# irreversible public push waits behind a OneBranch Approver Group check.        #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#################################################################################

# Auto-build + sign on a release tag push. The publish stage (gated by approval) only
# runs for tag builds (or a manual publishNuGet run), so a tag is the release trigger.
# branches: none keeps ordinary branch pushes off this Official pipeline (CI covers those).
trigger: # https://aka.ms/obpipelines/triggers
  branches:
    exclude:
      - '*'
  tags:
    include:
      - 'v*'

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false
- name: 'version'
  displayName: 'Version to pack (manual runs only; e.g. 0.1.0-preview.1). Leave as "auto" to use MinVer (release tags).'
  type: string
  # NOTE: a non-empty default ('auto') is deliberate. ADO's "Run pipeline" UI treats a
  # string parameter whose default is the EMPTY string as "required" (red asterisk) and
  # blocks queueing until a value is typed. The 'auto' sentinel removes that friction;
  # the resolve-version step maps 'auto' (and blank) back to the MinVer path.
  default: 'auto'
- name: 'publishNuGet'
  displayName: 'Publish packages to nuget.org. Tag pushes publish automatically (approval-gated); check this to run the gated publish on a manual run.'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  system.debug: ${{ parameters.debug }}

  # Mirror GitHub Actions' CI flag so dev-only nested builds stay off in CI.
  # Reactor.Cli's RunSignaturesGen target is gated on '$(CI)' != 'true' and otherwise
  # runs a nested `dotnet build` that does its OWN restore, which fails in a restricted
  # CI environment. The committed skills/reactor.api.txt is what pack consumes, so
  # skipping regen in CI is correct.
  CI: true

  # Skip the GitHub.Copilot.SDK native CLI download in CI.
  # The SDK's GitHub.Copilot.SDK.targets downloads copilot-<rid>.tgz via an MSBuild
  # DownloadFile task hardcoded to registry.npmjs.org, which can fail in a restricted
  # CI environment and cannot use an authenticated package feed. The native copilot.exe
  # is only a RUNTIME artifact for the demo-script-tool sample; it is not needed to
  # compile the framework, pack the NuGets, or run unit tests. MSBuild surfaces this env
  # var as the property the targets gate on ($(CopilotSkipCliDownload) != 'true'), so the
  # download target is skipped.
  CopilotSkipCliDownload: true

  # Reactor builds the .slnx solution via the dotnet CLI (no dirs.proj / msbuild.exe).
  BuildSolution: $(Build.SourcesDirectory)\Reactor.slnx
  BuildConfiguration: Release
  # Restore resolves from the pinned internal feed config.
  NuGetConfig: $(Build.SourcesDirectory)\build\pipelines\nuget.internal.config

  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2022/vse2022:latest' # Docker image which is used to build the project https://aka.ms/obpipelines/containers

resources:
  repositories: 
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/OneBranch.Official.CrossPlat.yml@templates # https://aka.ms/obpipelines/templates
  parameters:
    # Opt into the OneBranch "Deploy Box Products" release pathway: publishing packages to a
    # public, non-Azure feed (nuget.org) is a NonAzure-category release. This unlocks the
    # release stage below and applies the NonAzure release-task allow-list.
    release: # https://aka.ms/obpipelines/release
      category: NonAzure
    cloudvault: # https://aka.ms/obpipelines/cloudvault
      enabled: false
    globalSdl: # https://aka.ms/obpipelines/sdl
      tsa:
        enabled: true
      # credscan:
      #   suppressionsFile: $(Build.SourcesDirectory)\.config\CredScanSuppressions.json
      policheck:
        break: true # always break the build on policheck issues. You can disable it by setting to 'false'
      # suppression:
      #   suppressionFile: $(Build.SourcesDirectory)\.gdn\global.gdnsuppress

    stages:
    - stage: build
      jobs:
      - job: main
        pool:
          type: windows  # read more about custom job pool types at https://aka.ms/obpipelines/yaml/jobs
          hostVersion:  # request a 2022 host so the ltsc2022 image runs under process isolation (kernel match), aligning Official with CI
            Version: 2022
        
        variables: # More settings at https://aka.ms/obpipelines/yaml/jobs
          ob_outputDirectory: '$(Build.SourcesDirectory)\out' # this directory is uploaded to pipeline artifacts, reddog and cloudvault. More info at https://aka.ms/obpipelines/artifacts
          ob_git_fetchDepth: -1 # full git history + tags so MinVer can derive the version (shallow clone => 0.1.0 fallback)
          # https://aka.ms/obpipelines/sdl
          ob_sdl_binskim_enabled: true # run BinSkim (matches CI; explicit for parity)
          ob_sdl_binskim_break: true # always break the build on binskim issues, even if TSA enabled. You can disable it by setting to 'false'
          # NOTE: unlike CI, Official does NOT set ob_sdl_binskim_scanOutputDirectoryOnly -- the
          # release build scans the full tree (stricter compliance posture), not just out\.
          ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/main') }}: # conditionally enable symbolsPublishing for main branch only
            ob_symbolsPublishing_enabled: true # https://aka.ms/obpipelines/symbols
          # ob_sdl_suppression_suppressionFile: $(Build.SourcesDirectory)\.gdn\job.gdnsuppress

        steps:
          - template: /build/pipelines/templates/reactor-build-steps.yml@self
            parameters:
              outputDirectory: '$(Build.SourcesDirectory)\out'
              solution: '$(BuildSolution)'
              configuration: '$(BuildConfiguration)'
              nugetConfig: '$(NuGetConfig)'
              version: ${{ parameters.version }}
              runTests: false # selftests/E2E need a live WinUI window; not available in CI
              pack: true
              # Two-phase ESRP signing (Official builds only): Authenticode-sign the framework
              # assembly + mur binaries BEFORE pack/zip so the DLLs inside the .nupkg and the
              # skill-kit zip are signed, then NuGet-sign the .nupkg containers after pack.
              sign: true
              # The build job NEVER pushes to nuget.org. Publishing is the job of the
              # separate `Production_PublishNuGet` release stage (OneBranch NonAzure
              # pathway) below, which consumes this stage's signed artifact and runs an
              # approval-gated NuGetCommand@2 push. Always false here so we never push twice.
              publishNuGet: false

    # ───────────────────────────────────────────────────────────────────────────────────
    # Publish stage — OneBranch "Deploy Box Products" (NonAzure) release pathway.
    # Pushes the SIGNED packages produced by `build` to nuget.org. Runs automatically on a
    # release tag push (vX.Y.Z / vX.Y.Z-preview.N) and on a manual run with the publishNuGet
    # checkbox. A OneBranch Approver Group check on the `microsoft-ui-reactor-release` ADO
    # Environment pauses the run here until a maintainer approves — making the irreversible
    # public push deliberate (see docs/specs/057-release-channels.md §8).
    #
    # PORTAL PREREQUISITES (configured once, outside YAML — see §8.3 / §11):
    #   • A `microsoft-ui-reactor-release` ADO Environment with a OneBranch Approver Group check.
    #   • A NuGet service connection named `nuget-org` holding the nuget.org API key.
    # ───────────────────────────────────────────────────────────────────────────────────
    - stage: Production_PublishNuGet
      dependsOn: build
      # Publish on a release tag push, or when the publishNuGet checkbox is set on a manual run.
      # ${{ parameters.publishNuGet }} expands at compile time to True/False.
      condition: and(succeeded(), or(startsWith(variables['Build.SourceBranch'], 'refs/tags/v'), eq(${{ parameters.publishNuGet }}, true)))
      variables:
        # A "release stage" = every job sets pool.type: release, and ob_release_environment is
        # mandatory. This is the OneBranch release-RING classification (drives which SDL /
        # validations inject), NOT an ADO resource. It must be one of the fixed values:
        # Production | Mooncake | Fairfax | USSec | USNat | Bleu. Production = public PROD push.
        # https://aka.ms/obpipelines/release
        ob_release_environment: Production
        # Turn the release job into an ADO deployment job bound to an ADO Environment, so that
        # Environment's approval check gates the push. Both variables are required together.
        # ob_deploymentjob_environment names the literal ADO Environment RESOURCE (the thing in
        # Pipelines → Environments) — an arbitrary, project-unique name, NOT the fixed ring set
        # above. The Environment + its OneBranch Approver Group check live in project settings
        # (portal), NOT in YAML.
        ob_release_usedeploymentjob: true
        ob_deploymentjob_environment: microsoft-ui-reactor-release
      jobs:
      - job: push
        pool:
          type: release  # release agents; the ADO pool still shows as "OneBranchPipelines"
        templateContext:
          # Declarative artifact download — OneBranch blocks `checkout` and explicit download
          # tasks in release stages. The build job uploads its ob_outputDirectory as
          # drop_<stage>_<job> => drop_build_main, auto-downloaded to
          # $(Pipeline.Workspace)/drop_build_main with SBOM + governed-build validation injected.
          inputs:
          - input: pipelineArtifact
            artifactName: drop_build_main
        steps:
          # `dotnet nuget push` (a raw CLI/script) is NOT on the NonAzure allow-list; the
          # allowed publish task is NuGetCommand@2 with command: push. nuget.org credentials
          # come from a NuGet SERVICE CONNECTION (holding the API key), referenced by name —
          # never a YAML secret/env var. The glob matches *.nupkg ONLY — never *.snupkg.
          # NuGetCommand@2 shells out to nuget.exe, and `nuget.exe push <pkg>.nupkg`
          # AUTOMATICALLY pushes the adjacent <pkg>.snupkg to nuget.org's symbol endpoint.
          # Adding *.snupkg to the glob therefore pushes each symbol package twice: the second
          # (explicit) push hits HTTP 409 "another copy of this symbols package pending
          # validation", which allowPackageConflicts does NOT suppress (it only neutralizes the
          # main-package "already exists" conflict, not the symbol-server pending-validation
          # 409). Listing *.nupkg alone publishes both the package and its symbols exactly once.
          # allowPackageConflicts keeps re-runs idempotent: a package version already on the
          # feed is skipped rather than failing the run.
          - task: NuGetCommand@2
            displayName: 'Publish NuGet packages (nuget.org)'
            inputs:
              command: push
              packagesToPush: '$(Pipeline.Workspace)/drop_build_main/nupkg/*.nupkg'
              nuGetFeedType: external
              publishFeedCredentials: 'nuget-org'  # ADO NuGet service connection (create in portal)
              allowPackageConflicts: true  # idempotent re-runs: a version already on the feed is skipped, not a 409